<div class="row mt-3">
  <div class="card shadow-sm p-4 mb-4">
    <div class="mb-3">
      <label for="folderPath" class="form-label">Fichiers trouvés à partir de :</label>
      <input type="text" id="folderPath" class="form-control" [value]="folderPath()" disabled>
    </div>

    <div class="mb-3">
      <h6>Liste des médias :</h6>
      <div class="list-group">
        <button class="list-group-item list-group-item-action"
                [class.active]="!mediaFile()?.videoId"
                (click)="onMediaClick(null)">
          Ne rien afficher
        </button>
        <button *ngFor="let file of files()"
                class="list-group-item list-group-item-action"
                [class.active]="file === mediaFile()?.videoId"
                (click)="onMediaClick(file)">
          {{ file }}
        </button>
      </div>
    </div>

    <div style="position: relative; width: 100%; max-width: 800px; margin: auto;">

      @if(mediaType() === MediaType.VIDEO){
        <video #myVideo
               controls
               [src]="mediaPath()"
               (play)="playVideo()"
               (pause)="pauseVideo()"
               (seeked)="onTimeUpdate()"
               (ratechange)="onRateChange()"
               style="width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        </video>
      }

      @if(mediaType() === MediaType.IMAGE){
        <img [src]="mediaPath()"
             alt="Selected Media"
             class="mw-50 object-fit-contain rounded shadow">
      }

      @if(mediaType() === MediaType.PDF){
        <div class="pdf-viewport">
          <iframe [src]="pdfUrl()"
                  class="pdf-controlled-iframe"
                  [style.top.px]="pdfScrollY()"
                  [style.transform]="pdfScaleTransform()">
          </iframe>
        </div>

        <div class="d-flex align-items-center justify-content-center gap-2 mt-2 flex-wrap">
          <button class="btn btn-outline-secondary btn-sm" (click)="prevPage()" [disabled]="currentPage() <= 1">
            ◀ Prev
          </button>
          <span class="fw-medium">
            Page {{ currentPage() }}
            @if(totalPages() !== null) { / {{ totalPages() }} }
          </span>
          <button class="btn btn-outline-secondary btn-sm" (click)="nextPage()" [disabled]="totalPages() !== null && currentPage() >= totalPages()">
            Next ▶
          </button>

          <span class="mx-1 text-muted">|</span>

          <button class="btn btn-outline-secondary btn-sm" (click)="scrollUp()" title="Scroll up">↑</button>
          <button class="btn btn-outline-secondary btn-sm" (click)="scrollDown()" title="Scroll down">↓</button>

          <span class="mx-1 text-muted">|</span>

          <button class="btn btn-outline-secondary btn-sm" (click)="zoomOut()" [disabled]="pdfZoom() <= 0.5">−</button>
          <span class="fw-medium">{{ pdfZoom() * 100 }}%</span>
          <button class="btn btn-outline-secondary btn-sm" (click)="zoomIn()" [disabled]="pdfZoom() >= 3">+</button>
        </div>
      }

    </div>
  </div>
</div>
